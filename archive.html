<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Archive — Webcomic</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-top">
    <div class="banner" role="presentation">
      <img src="assets/banner.png" width="1600" height="900" alt="Title banner">
    </div>
    <nav class="site-nav" aria-label="Site">
      <a href="index.html">Latest</a>
      <a href="archive.html" aria-current="page">Archive</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <div class="archive-page">
    <a class="back-link" href="index.html">← Latest issue</a>
    <h1>Archive</h1>
    <ul id="archive-list"></ul>
  </div>

  <footer class="site-foot">
    Newest last — use the reader for navigation between issues.
  </footer>

  <script src="issues.js"></script>
  <script>
(function () {
  var issues = window.COMIC_ISSUES;
  var ul = document.getElementById("archive-list");
  if (!issues || !ul) return;

  var sorted = issues.slice().sort(function (a, b) {
    return a.n - b.n;
  });

  sorted.forEach(function (issue) {
    var li = document.createElement("li");
    var a = document.createElement("a");
    a.href = "index.html?issue=" + issue.n;
    var num = document.createElement("span");
    num.className = "issue-num";
    num.textContent = "#" + issue.n;
    a.appendChild(num);
    a.appendChild(document.createTextNode(issue.title || "Untitled"));
    li.appendChild(a);
    ul.appendChild(li);
  });
})();
  </script>
</body>
</html>
